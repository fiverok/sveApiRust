<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Светогорский ЦБК | Мониторинг оборудования</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="pattern-bg">
    <div class="monitor-container">
        <div class="app-card">
            <!-- Header -->
            <div class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <div class="logo-icon">
                            <i class="fas fa-tree"></i>
                        </div>
                        <div class="logo-text">
                            <h1>НПАО «Светогорский ЦБК»</h1>
                            <p>Система мониторинга оборудования и удалённого доступа</p>
                        </div>
                    </div>
                    <div class="stats-badge">
                        <div class="stat-item">
                            <div class="stat-label">ВСЕГО УСТРОЙСТВ</div>
                            <div class="stat-value" id="totalCount">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">АКТИВНО</div>
                            <div class="stat-value" id="onlineCount">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">ОФФЛАЙН</div>
                            <div class="stat-value" id="offlineCount">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="nav-bar">
                <div class="nav-links">
                    <a href="/">📊 Мониторинг</a>
                    <a href="/admin" id="adminLink" style="display: none;">⚙️ Управление</a>
                    <a href="#" onclick="logout()">🚪 Выход</a>
                </div>
            </div>

            <!-- Search Panel -->
            <div class="search-panel">
                <div class="search-wrapper">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Поиск по имени компьютера, пользователю или ID...">
                    </div>
                    <select id="searchType" class="search-type-select">
                        <option value="all">🔍 Все поля</option>
                        <option value="hostname">💻 Имя ПК</option>
                        <option value="username">👤 Пользователь</option>
                        <option value="id">🆔 ID оборудования</option>
                        <option value="ip">🌐 IP адрес</option>
                    </select>
                    <button class="refresh-btn" onclick="loadComputers()">
                        <i class="fas fa-sync-alt"></i>
                        Обновить
                    </button>
                </div>
                <div class="search-info" id="searchInfo">
                    <i class="fas fa-info-circle"></i>
                    <span id="searchInfoText"></span>
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="computers-table" id="computersTable">
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Наименование оборудования</th>
                            <th>ID оборудования</th>
                            <th>Пользователь</th>
                            <th>IP адрес</th>
                            <th>Статус</th>
                            <th>Последний контакт</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="empty-state">
                                <i class="fas fa-spinner fa-pulse"></i>
                                <p>Загрузка данных...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-wrapper" id="paginationWrapper" style="display: none;">
                <button class="page-btn" id="prevBtn" onclick="prevPage()">
                    <i class="fas fa-chevron-left"></i>
                    Назад
                </button>
                <span class="page-info" id="pageInfo">Страница 1</span>
                <button class="page-btn" id="nextBtn" onclick="nextPage()">
                    Вперед
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification">
        <i class="fas fa-plug"></i>
        <span id="toastMessage">Подключение...</span>
    </div>

    <script>
        const API_URL = window.location.origin;
        let allComputers = [];
        let currentPage = 1;
        let itemsPerPage = 20;
        let autoRefreshInterval = null;
        let isAdmin = false;
        let sessionCheckInterval = null;
        let activityTimeout = null;

        // ========== УПРАВЛЕНИЕ СЕССИЕЙ ==========
        
        async function checkSession() {
            try {
                const response = await fetch('/api/session/check');
                const data = await response.json();
                
                if (!data.active) {
                    if (data.reason === 'timeout') {
                        showToast('⚠️ Сессия истекла из-за бездействия. Войдите снова.', false);
                    } else {
                        showToast('⚠️ Сессия неактивна. Войдите снова.', false);
                    }
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Session check error:', error);
                return true;
            }
        }

        async function extendSession() {
            try {
                await fetch('/api/session/extend', { method: 'POST' });
            } catch (error) {
                console.error('Session extend error:', error);
            }
        }

        function updateActivity() {
            extendSession();
            if (activityTimeout) clearTimeout(activityTimeout);
            activityTimeout = setTimeout(() => {
                checkSession();
            }, 120000); // Проверка через 2 минуты бездействия
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (error) {
                console.error('Logout error:', error);
            }
            window.location.href = '/login';
        }

        // Отслеживаем действия пользователя для продления сессии
        document.addEventListener('click', updateActivity);
        document.addEventListener('keypress', updateActivity);
        document.addEventListener('mousemove', updateActivity);
        document.addEventListener('scroll', updateActivity);

        // Запускаем проверку сессии каждую минуту
        if (sessionCheckInterval) clearInterval(sessionCheckInterval);
        sessionCheckInterval = setInterval(async () => {
            const isActive = await checkSession();
            if (!isActive) {
                clearInterval(sessionCheckInterval);
            }
        }, 60000);

        // ========== ПРОВЕРКА АДМИНИСТРАТОРА ==========
        
        async function checkAdmin() {
            try {
                const response = await fetch('/api/users/me');
                if (response.ok) {
                    const user = await response.json();
                    if (user.role === 'admin') {
                        isAdmin = true;
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
            }
        }

        // ========== КОПИРОВАНИЕ В БУФЕР ОБМЕНА ==========
        
        function copyToClipboard(text, computerName) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToastCopy(`✅ Имя "${computerName}" скопировано`);
                }).catch(() => {
                    fallbackCopyToClipboard(text, computerName);
                });
            } else {
                fallbackCopyToClipboard(text, computerName);
            }
        }

        function fallbackCopyToClipboard(text, computerName) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            
            let success = false;
            try {
                success = document.execCommand('copy');
            } catch (err) {
                console.error('Fallback copy error:', err);
            }
            
            document.body.removeChild(textarea);
            
            if (success) {
                showToastCopy(`✅ Имя "${computerName}" скопировано`);
            } else {
                showToastCopy(`❌ Не удалось скопировать`, true);
            }
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        
        function showToastCopy(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMessage.textContent = message;

            if (isError) {
                icon.className = 'fas fa-exclamation-triangle';
                toast.style.background = '#c62828';
                toast.style.borderLeftColor = '#FFC700';
            } else {
                icon.className = 'fas fa-copy';
                toast.style.background = '#004D43';
                toast.style.borderLeftColor = '#FFC700';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMessage.textContent = message;

            if (isError) {
                icon.className = 'fas fa-exclamation-triangle';
                toast.style.background = '#c62828';
                toast.style.borderLeftColor = '#FFC700';
            } else {
                icon.className = 'fas fa-plug';
                toast.style.background = '#004D43';
                toast.style.borderLeftColor = '#FFC700';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========== ПОДКЛЮЧЕНИЕ ЧЕРЕЗ RUSTDESK ==========
        
        function connectRustDesk(computerId, computerName) {
            if (!computerId) {
                showToast('ID оборудования не указан', true);
                return;
            }
            showToast(`🖥️ Подключение к ${computerName || computerId}...`);
            window.location.href = `rustdesk://connection/new/${computerId}`;
        }

        // ========== ФОРМАТИРОВАНИЕ ==========
        
        function formatDate(dateString) {
            if (!dateString) return 'Никогда';
            const date = new Date(dateString);
            const now = new Date();
            const diffSeconds = Math.floor((now - date) / 1000);
            if (diffSeconds < 60) return `${diffSeconds} сек назад`;
            if (diffSeconds < 3600) return `${Math.floor(diffSeconds / 60)} мин назад`;
            return date.toLocaleString('ru-RU');
        }

        function isOnline(lastSeen) {
            if (!lastSeen) return false;
            return (new Date() - new Date(lastSeen)) < 30000;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ========== ФИЛЬТРАЦИЯ ==========
        
        function filterComputers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const searchType = document.getElementById('searchType').value;
            
            if (!searchTerm) {
                filteredComputers = [];
                document.getElementById('searchInfoText').innerHTML = `Введите текст для поиска`;
                return [];
            }
            
            const filtered = allComputers.filter(computer => {
                switch(searchType) {
                    case 'hostname':
                        return (computer.hostname || '').toLowerCase().includes(searchTerm);
                    case 'username':
                        return (computer.username || '').toLowerCase().includes(searchTerm);
                    case 'id':
                        return (computer.id || '').toLowerCase().includes(searchTerm);
                    case 'ip':
                        return (computer.ip || '').toLowerCase().includes(searchTerm);
                    default:
                        return (computer.hostname || '').toLowerCase().includes(searchTerm) ||
                               (computer.username || '').toLowerCase().includes(searchTerm) ||
                               (computer.id || '').toLowerCase().includes(searchTerm) ||
                               (computer.ip || '').toLowerCase().includes(searchTerm);
                }
            });
            
            document.getElementById('searchInfoText').innerHTML = `Найдено: ${filtered.length} из ${allComputers.length} устройств`;
            return filtered;
        }

        // ========== ОБНОВЛЕНИЕ ОТОБРАЖЕНИЯ ==========
        
        function updateDisplay() {
            const searchTerm = document.getElementById('searchInput').value;
            
            let filtered;
            if (!searchTerm) {
                filtered = [];
                document.getElementById('searchInfoText').innerHTML = `Введите текст для поиска`;
            } else {
                filtered = filterComputers();
            }

            const onlineCount = allComputers.filter(c => isOnline(c.last_online)).length;
            const offlineCount = allComputers.length - onlineCount;
            document.getElementById('onlineCount').textContent = onlineCount;
            document.getElementById('offlineCount').textContent = offlineCount;
            document.getElementById('totalCount').textContent = allComputers.length;

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filtered.length);
            const paginatedData = filtered.slice(startIndex, endIndex);

            const paginationWrapper = document.getElementById('paginationWrapper');
            if (totalPages > 1 && filtered.length > 0) {
                paginationWrapper.style.display = 'flex';
                document.getElementById('pageInfo').innerHTML = `Страница ${currentPage} из ${totalPages}`;
                document.getElementById('prevBtn').disabled = currentPage === 1;
                document.getElementById('nextBtn').disabled = currentPage === totalPages;
            } else {
                paginationWrapper.style.display = 'none';
            }

            const tbody = document.getElementById('tableBody');
            
            if (!searchTerm) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-search"></i><p>Введите текст для поиска</p></td></tr>`;
                return;
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-search"></i><p>Оборудование не найдено</p></td></tr>`;
                return;
            }

            tbody.innerHTML = paginatedData.map((computer, idx) => {
                const online = isOnline(computer.last_online);
                const computerName = escapeHtml(computer.hostname || 'Unknown');
                const computerId = escapeHtml(computer.id);
                return `
                    <tr onclick="connectRustDesk('${computerId}', '${computerName.replace(/'/g, "\\'")}')">
                        <td><strong>${startIndex + idx + 1}</strong></td>
                        <td style="cursor: pointer;" onclick="event.stopPropagation(); copyToClipboard('${computerName.replace(/'/g, "\\'")}', '${computerName.replace(/'/g, "\\'")}')" title="Нажмите чтобы скопировать имя">
                            <div class="computer-name">
                                <i class="fas fa-laptop-code"></i> ${computerName}
                            </div>
                        </span>
                        <td>
                            <span class="computer-id" onclick="event.stopPropagation(); connectRustDesk('${computerId}', '${computerName.replace(/'/g, "\\'")}')" title="Нажмите для подключения через RustDesk">
                                ${computerId} <i class="fas fa-external-link-alt"></i>
                            </span>
                        </span>
                        <td><i class="fas fa-user"></i> ${escapeHtml(computer.username || 'Unknown')}</span>
                        <td><i class="fas fa-network-wired"></i> ${escapeHtml(computer.ip || 'N/A')}</span>
                        <td>
                            <div class="${online ? 'status-online' : 'status-offline'}">
                                <i class="fas fa-circle"></i> ${online ? 'АКТИВНО' : 'ОФФЛАЙН'}
                            </div>
                        </span>
                        <td><i class="far fa-clock"></i> ${formatDate(computer.last_online)}</span>
                    </span>
                `;
            }).join('');
        }

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        
        async function loadComputers() {
            try {
                const response = await fetch(`${API_URL}/api/computers`);
                if (!response.ok) throw new Error('Ошибка загрузки');
                allComputers = await response.json();
                currentPage = 1;
                updateDisplay();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showToast('❌ Ошибка подключения к серверу', true);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ошибка подключения к серверу</p></td></tr>`;
            }
        }

        // ========== ПАГИНАЦИЯ ==========
        
        function prevPage() { 
            if (currentPage > 1) { 
                currentPage--; 
                updateDisplay(); 
            } 
        }
        
        function nextPage() {
            const searchTerm = document.getElementById('searchInput').value;
            const filtered = searchTerm ? filterComputers() : [];
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage < totalPages) { 
                currentPage++; 
                updateDisplay(); 
            }
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            updateDisplay();
        });
        
        document.getElementById('searchType').addEventListener('change', () => {
            currentPage = 1;
            updateDisplay();
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(loadComputers, 15000);

        checkAdmin();
        loadComputers();
    </script>
</body>
</html>
