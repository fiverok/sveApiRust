<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Светогорский ЦБК | Панель управления</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="pattern-bg">
    <div class="monitor-container">
        <div class="app-card">
            <div class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <div class="logo-icon"><i class="fas fa-tree"></i></div>
                        <div class="logo-text">
                            <h1>НПАО «Светогорский ЦБК»</h1>
                            <p>Панель управления системой мониторинга</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-bar">
                <div class="nav-links">
                    <a href="/">📊 Мониторинг</a>
                    <a href="/admin">⚙️ Управление</a>
                    <a href="/logout">🚪 Выход</a>
                </div>
            </div>

            <!-- Пользователи -->
            <div class="search-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <h3 style="color: #004D43;">👥 Пользователи</h3>
                    <button class="btn btn-primary" id="addUserBtn">➕ Добавить пользователя</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="computers-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Логин</th>
                            <th>Роль</th>
                            <th>Email</th>
                            <th>Создан</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6" class="empty-state">Загрузка...</td</tr>
                    </tbody>
                </table>
            </div>

            <!-- Устройства -->
            <div class="search-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <h3 style="color: #004D43;">🖥️ Устройства</h3>
                    <div class="search-input-wrapper" style="width: 300px;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchDevices" class="search-input" placeholder="Поиск устройств...">
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="computers-table">
                    <thead>
                        <tr>
                            <th>Имя устройства</th>
                            <th>ID</th>
                            <th>Пользователь</th>
                            <th>IP</th>
                            <th>Статус</th>
                            <th>Последний контакт</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTableBody">
                        <tr><td colspan="7" class="empty-state">Загрузка...</td</tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Добавить пользователя</h3>
                <span class="close">&times;</span>
            </div>
            <form id="addUserForm">
                <div class="form-group">
                    <label>Логин *</label>
                    <input type="text" id="newUsername" required>
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="newRole">
                        <option value="user">Пользователь</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail">
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast-notification">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        let allDevices = [];

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMessage.textContent = message;

            if (isError) {
                icon.className = 'fas fa-exclamation-triangle';
                toast.style.background = '#c62828';
            } else {
                icon.className = 'fas fa-check-circle';
                toast.style.background = '#004D43';
            }
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatDate(dateString) {
            if (!dateString) return 'Никогда';
            return new Date(dateString).toLocaleString('ru-RU');
        }

        function isOnline(lastOnline) {
            if (!lastOnline) return false;
            return (new Date() - new Date(lastOnline)) < 30000;
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (response.ok) {
                    const users = await response.json();
                    const tbody = document.getElementById('usersTableBody');
                    if (users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет пользователей</td</tr>';
                        return;
                    }
                    tbody.innerHTML = users.map(user => `
                        <tr>
                            <td>${user.id}</td>
                            <td><strong>${escapeHtml(user.username)}</strong></td>
                            <td><span style="background: #004D43; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px;">${user.role === 'admin' ? 'Админ' : 'Пользователь'}</span></td>
                            <td>${escapeHtml(user.email || '-')}</td>
                            <td>${formatDate(user.created_at)}</span></td>
                            <td><button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')">Удалить</button></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function loadDevices() {
            try {
                const response = await fetch('/api/computers');
                if (response.ok) {
                    allDevices = await response.json();
                    filterDevices();
                }
            } catch (error) {
                console.error('Error loading devices:', error);
            }
        }

        function filterDevices() {
            const searchTerm = document.getElementById('searchDevices').value.toLowerCase();
            const filtered = allDevices.filter(d => 
                (d.hostname || '').toLowerCase().includes(searchTerm) ||
                (d.id || '').toLowerCase().includes(searchTerm) ||
                (d.username || '').toLowerCase().includes(searchTerm)
            );

            const tbody = document.getElementById('devicesTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Нет устройств</td</tr>';
                return;
            }

            tbody.innerHTML = filtered.map(device => {
                const online = isOnline(device.last_online);
                return `
                    <tr>
                        <td><strong>${escapeHtml(device.hostname || 'Unknown')}</strong></td>
                        <td><code>${escapeHtml(device.id || '-')}</code></td>
                        <td>${escapeHtml(device.username || 'Unknown')}</td>
                        <td>${escapeHtml(device.ip || 'N/A')}</td>
                        <td><span style="color: ${online ? '#28a745' : '#dc3545'}">${online ? '🟢 Онлайн' : '🔴 Оффлайн'}</span></td>
                        <td>${formatDate(device.last_online)}</span></td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteDevice('${device.uuid}', '${escapeHtml(device.hostname)}')">Удалить</button></td>
                    </tr>
                `;
            }).join('');
        }

        async function deleteUser(userId, username) {
            if (confirm(`Удалить пользователя "${username}"?`)) {
                try {
                    const response = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
                    if (response.ok) {
                        showToast(`✅ Пользователь "${username}" удален`);
                        loadUsers();
                    } else {
                        showToast('❌ Ошибка удаления', true);
                    }
                } catch (error) {
                    showToast('❌ Ошибка удаления', true);
                }
            }
        }

        async function deleteDevice(uuid, hostname) {
            if (confirm(`Удалить устройство "${hostname}"?`)) {
                try {
                    const response = await fetch(`/api/computers/${uuid}`, { method: 'DELETE' });
                    if (response.ok) {
                        showToast(`✅ Устройство "${hostname}" удалено`);
                        loadDevices();
                    } else {
                        showToast('❌ Ошибка удаления', true);
                    }
                } catch (error) {
                    showToast('❌ Ошибка удаления', true);
                }
            }
        }

        const modal = document.getElementById('userModal');
        document.getElementById('addUserBtn').onclick = () => modal.classList.add('active');
        document.querySelector('.close').onclick = () => modal.classList.remove('active');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value,
                email: document.getElementById('newEmail').value
            };
            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                if (response.ok) {
                    showToast(`✅ Пользователь "${userData.username}" создан`);
                    modal.classList.remove('active');
                    document.getElementById('addUserForm').reset();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showToast(`❌ ${error.error || 'Ошибка создания'}`, true);
                }
            } catch (error) {
                showToast('❌ Ошибка создания', true);
            }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        document.getElementById('searchDevices').addEventListener('input', filterDevices);
        
        loadUsers();
        loadDevices();
        setInterval(loadDevices, 15000);
    </script>
</body>
</html>
